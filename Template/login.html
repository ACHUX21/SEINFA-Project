<!DOCTYPE html>
<html lang="en">
	<!--begin::Head-->
	<head><base href="../../../">
		<title>DATADEV</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta property="og:locale" content="en_US" />
		<meta property="og:type" content="article" />
		<link rel="shortcut icon" href="assets/media/logos/favicon.ico" />
		<!--begin::Fonts-->
		<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700" />
		<!--end::Fonts-->
		<!--begin::Global Stylesheets Bundle(used by all pages)-->
		<link href="assets/plugins/global/plugins.bundle.css" rel="stylesheet" type="text/css" />
		<link href="assets/css/style.bundle.css" rel="stylesheet" type="text/css" />
		<!--end::Global Stylesheets Bundle-->
	</head>
	<!--end::Head-->
	<!--begin::Body-->
	<body id="kt_body" class="bg-body">
		<!--begin::Main-->
		<!--begin::Root-->
		<div class="d-flex flex-column flex-root">
			<!--begin::Authentication - Sign-in -->
			<div class="d-flex flex-column flex-column-fluid bgi-position-y-bottom position-x-center bgi-no-repeat bgi-size-contain bgi-attachment-fixed" style="background-image: url(assets/media/illustrations/sketchy-1/14.png">
				<!--begin::Content-->
				<div class="d-flex flex-center flex-column flex-column-fluid p-10 pb-lg-20">
					<!--begin::Logo-->
					<a href="{{ url_for('index') }}" class="mb-12">
						<img alt="Logo" src="images/logo.png" class="h-40px" />
					</a>
					<!--end::Logo-->
					<!--begin::Wrapper-->
					<div class="w-lg-500px bg-body rounded shadow-sm p-10 p-lg-15 mx-auto">
						<!--begin::Form-->
						<form action="{{ url_for('auth') }}" method="POST">
							<!--begin::Heading-->
							<div class="text-center mb-10">
								<!--begin::Title-->
								<h1 class="text-dark mb-3">Se connecter à DATADEV</h1>
								<!--end::Title-->
							</div>
							<!--end::Heading-->
						
							<!--begin::Input group for Username-->
							<div class="fv-row mb-10">
								<!--begin::Label-->
								<label for="username" class="form-label fs-6 fw-bolder text-dark">Login</label>
								<!--end::Label-->
								<!--begin::Input-->
								<input id="username" class="form-control form-control-lg form-control-solid" type="text" name="username" autocomplete="off" required />
								<!--end::Input-->
							</div>
							<!--end::Input group-->
						
							<!--begin::Input group for Password-->
							<div class="fv-row mb-10">
								<!--begin::Wrapper-->
								<div class="d-flex flex-stack mb-2">
									<!--begin::Label-->
									<label for="password" class="form-label fw-bolder text-dark fs-6 mb-0">Mot de passe</label>
									<!--end::Label-->
									<!--begin::Link-->
									<a href="#" class="link-primary fs-6 fw-bolder">Mot de passe oublié?</a>
									<!--end::Link-->
								</div>
								<!--end::Wrapper-->
								<!--begin::Input-->
								<input id="password" class="form-control form-control-lg form-control-solid" type="password" name="password" autocomplete="off" required />
								<!--end::Input-->
							</div>
							<!--end::Input group-->
						
							<!--begin::Actions-->
							<div class="text-center">
								<!--begin::Submit button-->
								<button type="submit" id="kt_sign_in_submit" class="btn btn-lg btn-primary w-100 mb-5" data-kt-sign-in="submit">
									<span class="indicator-label">Continuer</span>
									<span class="indicator-progress visually-hidden">S'il vous plaît, attendez...
										<span class="spinner-border spinner-border-sm align-middle ms-2"></span>
									</span>
								</button>
								<!--end::Submit button-->
								<!--begin::Separator-->
								<div class="text-center text-muted text-uppercase fw-bolder mb-5">ou</div>
								<!--end::Separator-->
								<!--begin::Social login options-->
								<a href="#" class="btn btn-flex flex-center btn-light btn-lg w-100 mb-2">
									<img alt="Google Logo" src="assets/media/svg/brand-logos/google-icon.svg" class="h-20px me-3" />Continuer avec Google
								</a>
								<a href="#" class="btn btn-flex flex-center btn-light btn-lg w-100 mb-2">
									<img alt="Facebook Logo" src="assets/media/svg/brand-logos/facebook-4.svg" class="h-20px me-3" />Continuer avec Facebook
								</a>
								<a href="#" class="btn btn-flex flex-center btn-light btn-lg w-100">
									<img alt="Apple Logo" src="assets/media/svg/brand-logos/apple-black.svg" class="h-20px me-3" />Continuer avec Apple
								</a>
								<!--end::Social login options-->
							</div>
							<!--end::Actions-->
						</form>
						
						<!--end::Form-->
					</div>
					<!--end::Wrapper-->
				</div>
				<!--end::Content-->
				<!--begin::Footer-->
				<div class="d-flex flex-center flex-column-auto p-10">
					<!--begin::Links-->
					<div class="d-flex align-items-center fw-bold fs-6">
						<a href="https://data-dev.ma" class="text-muted text-hover-primary px-2">A propos</a>
						<a href="mailto:contact@data-dev.ma" class="text-muted text-hover-primary px-2">Contact</a>
					</div>
					<!--end::Links-->
				</div>
				<!--end::Footer-->
			</div>
			<!--end::Authentication - Sign-in-->
		</div>
		<!--end::Root-->
		<!--end::Main-->
		<!--begin::Javascript-->
		<script>var hostUrl = "assets/";</script>
		<!--begin::Global Javascript Bundle(used by all pages)-->
		<script src="assets/plugins/global/plugins.bundle.js"></script>
		<script src="assets/js/scripts.bundle.js"></script>
		<!--end::Global Javascript Bundle-->
		<!--begin::Page Custom Javascript(used by this page)-->
		<script src="assets/js/custom/authentication/sign-in/general.js"></script>
		<!--end::Page Custom Javascript-->
		<!--end::Javascript-->
	</body>
	<!--end::Body-->
</html>
